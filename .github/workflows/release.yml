name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Create checksums
        run: >-
          python -c "from hashlib import sha256; from pathlib import Path;
          artifacts=sorted(p for p in Path('dist').iterdir() if p.is_file());
          Path('release').mkdir(exist_ok=True);
          Path('release/SHA256SUMS').write_text(''.join(
          f'{sha256(p.read_bytes()).hexdigest()}  {p.name}\n' for p in artifacts))"
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: release/SHA256SUMS

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  attach-github-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: release-checksums
          path: release
      - name: Attach distributions and checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* release/SHA256SUMS --clobber

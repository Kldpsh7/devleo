name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: pytest -q
      - run: mypy src

  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade build pip twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Validate shell installer
        if: runner.os == 'Linux'
        run: sh -n install.sh
      - name: Validate PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Tokens = $null
          $Errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "install.ps1"),
            [ref]$Tokens,
            [ref]$Errors
          ) | Out-Null
          if ($Errors.Count -gt 0) {
            $Errors | Format-List | Out-String | Write-Error
            exit 1
          }
      - name: Install built wheel
        run: >-
          python -c "import glob, subprocess, sys;
          subprocess.check_call([sys.executable, '-m', 'pip', 'install',
          '--force-reinstall', *glob.glob('dist/*.whl')])"
      - run: python -m pip check
      - run: lion-cub-pet version
      - name: Verify packaged licenses
        run: >-
          python -c "from importlib.metadata import distribution;
          dist=distribution('lion-cub-pet');
          assert dist.metadata['License-Expression']=='MIT AND CC-BY-4.0';
          files={str(path).replace('\\', '/') for path in (dist.files or [])};
          assert any(path.endswith('/licenses/LICENSE') for path in files), files;
          assert any(path.endswith('/licenses/LICENSE-ASSETS.md') for path in files), files"
      - name: Verify packaged pet assets
        run: >-
          python -c "from importlib.resources import files;
          root=files('lion_cub_pet.assets');
          required=['spritesheet.webp','byte-approved-concept.png',
          'animations/working/00.png','modes/focus/00.png'];
          assert all(root.joinpath(path).is_file() for path in required), required"
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: python-package-distributions
          path: dist/*
